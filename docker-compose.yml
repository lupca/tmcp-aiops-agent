version: '3.8'

services:
  # 1. Elasticsearch - To store and query logs
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: aiops-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Ollama - Local LLM Engine
  ollama:
    image: ollama/ollama:latest
    container_name: aiops-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Note: You have to manually pull the model inside this container once it starts:
    # docker exec -it aiops-ollama ollama pull llama3
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. AIOps Agent - Our custom microservice
  aiops-agent:
    build: .
    container_name: aiops-agent-api
    ports:
      - "8000:8000"
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-} # Fill your actual webhook URL in a .env file
    depends_on:
      elasticsearch:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  es_data:
  ollama_data:
